  <!-- =================================================== TEASER -->

    <div class="sec-head">
      <h2>Overview</h2>
    </div>
    <figure class="teaser">
      <img src="static/images/teaser.webp"
           alt="GIM-World teaser: long-horizon revisit, geometry-aware implicit memory">
      <figcaption>
        We present <strong>GIM-World</strong>, a geometry-aware implicit memory
        framework for video world models. By distilling 3D scene structure from
        a frozen 3D foundation model into a compact, fixed-size memory state,
        GIM-World produces long-horizon autoregressive rollouts that remain
        geometrically coherent and visually consistent with the underlying
        scene, while existing memory designs degrade into visible geometric
        distortion and memory drift.
      </figcaption>
    </figure>
